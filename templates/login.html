<!DOCTYPE html>
<html lang="zh-CN"> <!-- 改为中文编码，适配中文显示 -->

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电影推荐系统-登录</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* 单独给输入框开启选中功能 */
        input.form_input {
            user-select: text;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            background-color: #ecf0f3;
            color: #a0a5a8;
            /* 避免body滚动 */
            overflow: hidden;
        }

        .shell {
            position: relative;
            /* 核心修正：移除固定min-width，改用max-width适配响应式 */
            width: 90%;
            max-width: 1000px;
            min-height: 600px;
            height: 600px;
            padding: 25px;
            background-color: #ecf0f3;
            box-shadow: 10px 10px 10px #d1d9e6, -10px 10px 10px #f9f9f9;
            border-radius: 12px;
            overflow: hidden;
        }

        /* 优化响应式：不用scale缩放，改用宽度自适应 */
        @media (max-width: 1000px) {
            .shell {
                height: 500px;
                min-height: 500px;
            }
            .container {
                width: 500px;
            }
            .switch {
                width: 350px;
            }
            .switch_container {
                width: 350px;
                padding: 30px 40px;
            }
            .form_input {
                width: 300px;
            }
        }

        @media (max-width: 768px) {
            .shell {
                height: 450px;
                min-height: 450px;
            }
            .container {
                width: 400px;
            }
            .switch {
                width: 300px;
            }
            .switch_container {
                width: 300px;
                padding: 20px 30px;
            }
            .form_input {
                width: 250px;
            }
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            width: 600px;
            height: 100%;
            padding: 25px;
            background-color: #ecf0f3;
            transition: 1.25s;
        }

        .form {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        .iconfont {
            margin: 0 5px;
            border: rgba(0, 0, 0, 0.5) 2px solid;
            border-radius: 50%;
            font-size: 25px;
            padding: 3px;
            opacity: 0.5;
            transition: 0.1s;
        }

        .iconfont:hover {
            opacity: 1;
            transition: 0.15s;
            cursor: pointer;
        }

        .form_input {
            width: 350px;
            height: 40px;
            margin: 4px 0;
            padding-left: 25px;
            font-size: 13px;
            letter-spacing: 0.15px;
            border: none;
            outline: none;
            background-color: #ecf0f3;
            transition: 0.25s ease;
            border-radius: 8px;
            box-shadow: inset 2px 2px 4px #d1d9e6, inset -2px -2px 4px #f9f9f9;
        }

        .form_input:focus {
            box-shadow: inset 4px 4px 4px #d1d9e6, inset -4px 4px 4px #f9f9f9;
        }

        /* 新增：字段错误样式 */
        .field-error {
            color: #ff4444;
            font-size: 11px;
            margin-top: 2px;
            margin-bottom: 8px;
            width: 350px;
            text-align: left;
            padding-left: 25px;
        }

        /* 新增：全局错误样式 */
        .global-error {
            color: #ff4444;
            font-size: 12px;
            margin: 10px 0;
        }

        .form_span {
            margin-top: 30px;
            margin-bottom: 12px;
        }

        .form_link {
            color: #181818;
            font-size: 15px;
            margin-top: 25px;
            border-bottom: 1px solid #a0a5a8;
            line-height: 2;
        }

        .title {
            font-size: 34px;
            font-weight: 700;
            line-height: 3;
            color: #181818;
            letter-spacing: 10px;
        }

        .description {
            font-size: 14px;
            letter-spacing: 0.25px;
            text-align: center;
            line-height: 1.6;
        }

        .button {
            width: 180px;
            height: 50px;
            border-radius: 25px;
            margin-top: 50px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1.15px;
            background-color: #4B70E2;
            color: #f9f9f9;
            box-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #f9f9f9;
            border: none;
            outline: none;
            cursor: pointer;
            transition: 0.25s;
        }

        /* 核心修正：给所有button添加交互样式 */
        .button:hover {
            box-shadow: 6px 6px 10px #d1d9e6, -6px -6px 10px #f9f9f9;
            transform: scale(0.985);
        }

        .button:active,
        .button:focus {
            box-shadow: 2px 2px 6px #d1d9e6, -2px -2px 6px #f9f9f9;
            transform: scale(0.97);
        }

        .a-container {
            z-index: 100;
            left: calc(100% - 600px);
        }

        .b-container {
            left: calc(100% - 600px);
            z-index: 0;
        }

        .switch {
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 400px;
            padding: 50px;
            z-index: 200;
            transition: 1.25s;
            background-color: #ecf0f3;
            overflow: hidden;
            box-shadow: 4px 4px 10px #d1d9e6, -4px -4px 10px #d1d9e6;
        }

        .switch_circle {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background-color: #ecf0f3;
            box-shadow: inset 8px 8px 12px #b8bec7, inset -8px -8px 12px #fff;
            bottom: -60%;
            left: -60%;
            transition: 1.25s;
        }

        .switch_circle-t {
            top: -30%;
            left: 60%;
            width: 300px;
            height: 300px;
        }

        .switch_container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            position: absolute;
            width: 400px;
            padding: 50px 55px;
            transition: 1.25s;
        }

        /* 修正注册按钮样式：直接用a标签替代button嵌套 */
        .switch-link {
            display: inline-block;
            width: 180px;
            height: 50px;
            line-height: 50px;
            text-align: center;
            border-radius: 25px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1.15px;
            background-color: #4B70E2;
            color: #f9f9f9 !important;
            box-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #f9f9f9;
            border: none;
            outline: none;
            text-decoration: none;
            transition: 0.25s;
        }

        .is-txr {
            left: calc(100% - 400px);
            transition: 1.25s;
            transform-origin: left;
        }

        .is-txl {
            left: 0;
            transition: 1.25s;
            transform-origin: right;
        }

        .is-z {
            z-index: 200;
            transition: 1.25s;
        }

        .is-hidden {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            transition: 1.25s;
        }

        .is-gx {
            animation: is-gx 1.25s;
        }

        @keyframes is-gx {
            0%,
            10%,
            100% {
                width: 400px;
            }
            30%,
            50% {
                width: 500px;
            }
        }
    </style>
</head>

<body>
<div class="shell">
    <div class="container b-container" id="b-container">
        <!-- 核心修正：指定表单提交地址为登录视图的URL（需和urls.py中的路由一致） -->
        <form action="/login/" method="POST" class="form" id="b-form">
            {% csrf_token %}
            <h2 class="form_title title">登入账号</h2>

            <!-- 用户名输入框 + 字段级错误展示 -->
            <input type="text" class="form_input" placeholder="账户" name="username" required>
            {% if form.errors.username %}
                <div class="field-error">{{ form.errors.username.0 }}</div>
            {% endif %}

            <!-- 密码输入框 + 字段级错误展示 -->
            <input type="password" class="form_input" placeholder="密码" name="password" required>
            {% if form.errors.password %}
                <div class="field-error">{{ form.errors.password.0 }}</div>
            {% endif %}

            <!-- 核心修正：messages取值改为{{ meg }}，并添加全局错误样式 -->
            {% if messages %}
                {% for meg in messages %}
                    <div class="global-error">{{ meg }}</div>
                {% endfor %}
            {% endif %}

            <button class="form_button button" type="submit">登录</button>
        </form>
    </div>

    <div class="switch" id="switch-cnt">
        <div class="switch_circle"></div>
        <div class="switch_circle switch_circle-t"></div>
        <div class="switch_container" id="switch-c1">
            <h2 class="switch_title title" style="letter-spacing: 0;">Hello</h2>
            <p class="switch_description description">点击注册账号</p>
            <!-- 核心修正：移除button嵌套a，直接用a标签加样式 -->
            <a href="/register/" class="switch-link">注册</a>
        </div>
    </div>
</div>
</body>

</html>
