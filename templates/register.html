<!DOCTYPE html>
<html lang="zh-CN"> <!-- 改为中文编码，适配中文显示 -->

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电影推荐系统-注册</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 核心修正：只禁用非输入区域选中，保留输入框选中功能 */
            user-select: none;
        }

        /* 单独给输入框开启选中功能 */
        input.form_input {
            user-select: text;
        }

        /* 新增：错误提示红色样式 */
        .red {
            color: #ff4444 !important;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            background-color: #ecf0f3;
            color: #a0a5a8;
            overflow: hidden; /* 避免body滚动 */
        }

        .shell {
            position: relative;
            /* 核心修正：移除固定min-width，改用max-width适配响应式 */
            width: 90%;
            max-width: 1000px;
            min-height: 600px;
            height: 600px;
            padding: 25px;
            background-color: #ecf0f3;
            box-shadow: 10px 10px 10px #d1d9e6, -10px -10px 10px #f9f9f9;
            border-radius: 12px;
            overflow: hidden;
        }

        /* 优化响应式：不用scale缩放，改用宽度自适应 */
        @media (max-width: 1000px) {
            .shell {
                height: 550px;
                min-height: 550px;
            }
            .container {
                width: 500px;
            }
            .switch {
                width: 350px;
            }
            .switch_container {
                width: 350px;
                padding: 30px 40px;
            }
            .form_input {
                width: 300px;
            }
        }

        @media (max-width: 768px) {
            .shell {
                height: 500px;
                min-height: 500px;
            }
            .container {
                width: 400px;
            }
            .switch {
                width: 300px;
            }
            .switch_container {
                width: 300px;
                padding: 20px 30px;
            }
            .form_input {
                width: 250px;
            }
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            width: 600px;
            height: 100%;
            padding: 25px;
            background-color: #ecf0f3;
            transition: 1.25s;
        }

        .form {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        .iconfont {
            margin: 0 5px;
            border: rgba(0, 0, 0, 0.5) 2px solid;
            border-radius: 50%;
            font-size: 25px;
            padding: 3px;
            opacity: 0.5;
            transition: 0.1s;
        }

        .iconfont:hover {
            opacity: 1;
            transition: 0.15s;
            cursor: pointer;
        }

        .form_input {
            width: 350px;
            height: 40px;
            margin: 4px 0;
            padding-left: 25px;
            font-size: 13px;
            letter-spacing: 0.15px;
            border: none;
            outline: none;
            background-color: #ecf0f3;
            transition: 0.25s ease;
            border-radius: 8px;
            box-shadow: inset 2px 2px 4px #d1d9e6, inset -2px -2px 4px #f9f9f9;
        }

        .form_input:focus {
            /* 修正focus阴影写法：移除多余的-4px */
            box-shadow: inset 4px 4px 4px #d1d9e6, inset -4px -4px 4px #f9f9f9;
        }

        /* 调整提示文本样式，统一对齐 */
        .form-tip {
            font-size: 11px;
            margin-top: 2px;
            margin-bottom: 8px;
            width: 350px;
            text-align: left;
            padding-left: 25px;
            color: #a0a5a8;
        }

        .form_span {
            margin-top: 30px;
            margin-bottom: 12px;
        }

        .form_link {
            color: #181818;
            font-size: 15px;
            margin-top: 25px;
            border-bottom: 1px solid #a0a5a8;
            line-height: 2;
        }

        .title {
            font-size: 34px;
            font-weight: 700;
            line-height: 3;
            color: #181818;
            letter-spacing: 10px;
        }

        .description {
            font-size: 14px;
            letter-spacing: 0.25px;
            text-align: center;
            line-height: 1.6;
        }

        .button {
            width: 180px;
            height: 50px;
            border-radius: 25px;
            margin-top: 50px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1.15px;
            background-color: #4B70E2;
            color: #f9f9f9;
            box-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #f9f9f9;
            border: none;
            outline: none;
            cursor: pointer; /* 新增：提示可点击 */
            transition: 0.25s;
        }

        /* 给所有按钮添加交互样式 */
        .button:hover {
            box-shadow: 6px 6px 10px #d1d9e6, -6px -6px 10px #f9f9f9;
            transform: scale(0.985);
        }

        .button:active,
        .button:focus {
            box-shadow: 2px 2px 6px #d1d9e6, -2px -2px 6px #f9f9f9;
            transform: scale(0.97);
        }

        .a-container {
            z-index: 100;
            left: calc(100% - 600px);
        }

        .b-container {
            left: calc(100% - 600px);
            z-index: 0;
        }

        .switch {
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 400px;
            padding: 50px;
            z-index: 200;
            transition: 1.25s;
            background-color: #ecf0f3;
            overflow: hidden;
            box-shadow: 4px 4px 10px #d1d9e6, -4px -4px 10px #d1d9e6;
        }

        .switch_circle {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background-color: #ecf0f3;
            box-shadow: inset 8px 8px 12px #b8bec7, inset -8px -8px 12px #fff;
            bottom: -60%;
            left: -60%;
            transition: 1.25s;
        }

        .switch_circle-t {
            top: -30%;
            left: 60%;
            width: 300px;
            height: 300px;
        }

        .switch_container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            position: absolute;
            width: 400px;
            padding: 50px 55px;
            transition: 1.25s;
        }

        .switch_button {
            cursor: pointer;
        }

        /* 修正注册按钮样式：直接用a标签替代button嵌套 */
        .switch-link {
            display: inline-block;
            width: 180px;
            height: 50px;
            line-height: 50px;
            text-align: center;
            border-radius: 25px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1.15px;
            background-color: #4B70E2;
            color: #f9f9f9 !important;
            box-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #f9f9f9;
            border: none;
            outline: none;
            text-decoration: none;
            transition: 0.25s;
        }

        .is-txr {
            left: calc(100% - 400px);
            transition: 1.25s;
            transform-origin: left;
        }

        .is-txl {
            left: 0;
            transition: 1.25s;
            transform-origin: right;
        }

        .is-z {
            z-index: 200;
            transition: 1.25s;
        }

        .is-hidden {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            transition: 1.25s;
        }

        .is-gx {
            animation: is-gx 1.25s;
        }

        @keyframes is-gx {
            0%,
            10%,
            100% {
                width: 400px;
            }
            30%,
            50% {
                width: 500px;
            }
        }
    </style>
</head>

<body>
    <div class="shell">
        <div class="container a-container" id="a-container">
            <!-- 核心修正：指定表单提交地址为注册视图的URL（需和urls.py一致） -->
            <form action="/register/" method="post" class="form" id="a-form" onsubmit="return sub()">
                {% csrf_token %}
                <h2 class="form_title title">创建账号</h2>

                <!-- 用户名输入框 + 提示 -->
                <input type="text" class="form_input" placeholder="账号" name="username" id="name" onblur="nameCheck()">
                <div class="form-tip name">6~18位由数字和英文字母组成的账户名</div>

                <!-- 密码输入框 + 提示 -->
                <input type="password" class="form_input" placeholder="密码" name="password1" id="pwd" onblur="pwdCheck()">
                <div class="form-tip pwd">请输入6-18位密码</div>

                <!-- 确认密码输入框 + 提示 -->
                <input type="password" class="form_input" placeholder="重复密码" name="password2" id="pwd1" onblur="pwdSure()">
                <div class="form-tip pwd1">请再次输入密码</div>

                <!-- 邮箱输入框 + 提示 -->
                <input type="text" class="form_input" placeholder="邮箱" name="email" id="email" onblur="emailCheck()">
                <div class="form-tip email">ex:123456@qq.com</div>

                <!-- 核心修正：messages取值改为{{ meg }}，并转义引号避免JS错误 -->
                <script>
                    {% if messages %}
                        {% for meg in messages %}
                            alert("{{ meg|escapejs }}");
                        {% endfor %}
                    {% endif %}
                </script>

                <button class="form_button button" type="submit">注册</button>
            </form>
        </div>

        <div class="switch" id="switch-cnt">
            <div class="switch_circle"></div>
            <div class="switch_circle switch_circle-t"></div>
            <div class="switch_container" id="switch-c1">
                <h2 class="switch_title title" style="letter-spacing: 0;">Welcome Back！</h2>
                <p class="switch_description description">已经有账号了嘛，去登入账号来进入电影世界吧！！！</p>
                <!-- 核心修正：移除button嵌套a，直接用a标签加样式 -->
                <a href="/login/" class="switch-link">登录</a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
    <script>
        // 表单提交验证（绑定在form的onsubmit，返回false阻止提交）
        function sub() {
            // 先执行所有验证函数
            let nameOk = nameCheck();
            let pwdOk = pwdCheck();
            let pwdSureOk = pwdSure();
            let emailOk = emailCheck();

            // 全部正确则提交，否则提示错误
            if (nameOk && pwdOk && pwdSureOk && emailOk) {
                return true; // 允许表单提交
            } else {
                alert('你的输入有误，请按要求输入后再提交');
                return false; // 阻止表单提交
            }
        }

        // 验证用户名（修正函数无多余参数）
        function nameCheck() {
            // 正则：6~18位数字+字母组合（不能纯数字/纯字母）
            let reg = /^(?![0-9]+$)(?![a-zA-Z]+$)[0-9A-Za-z]{6,18}$/;
            let name = $("#name").val().trim(); // 去除首尾空格
            if (!reg.test(name) || name === '') {
                $(".name").html("<span class='red'>请输入6~18位由数字和英文字母组成的账户名</span>");
                return false;
            } else {
                $(".name").text('√');
                return true;
            }
        }

        // 验证邮箱（修正函数无多余参数，放宽正则适配更多邮箱）
        function emailCheck() {
            // 正则：适配主流邮箱（如163.com、qq.com、126.com.cn等）
            let reg = /^[a-zA-Z0-9_-]+@[a-zA-Z0-9_-]+(\.[a-zA-Z0-9_-]+)+$/;
            let email = $("#email").val().trim();
            if (!reg.test(email) || email === '') {
                $(".email").html("<span class='red'>请输入正确的邮箱（如123456@qq.com）</span>");
                return false;
            } else {
                $(".email").text('√');
                return true;
            }
        }

        // 验证密码（修正正则结束符，统一提示文本）
        function pwdCheck() {
            let reg = /^[\s\S]{6,18}$/; // 补充$，确保6-18位
            let pwd = $("#pwd").val().trim();
            if (!reg.test(pwd) || pwd === '') {
                $(".pwd").html("<span class='red'>请输入6-18位密码</span>");
                return false;
            } else {
                $(".pwd").text('√');
                return true;
            }
        }

        // 确认密码（修正提示文本修改对象为.pwd1）
        function pwdSure() {
            let pwd = $("#pwd").val().trim();
            let pwd1 = $("#pwd1").val().trim();
            if (pwd === pwd1 && pwd !== '') {
                $(".pwd1").text('√');
                return true;
            } else {
                $(".pwd1").html("<span class='red'>两次密码输入不一致</span>");
                return false;
            }
        }
    </script>
</body>

</html>
